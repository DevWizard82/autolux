<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXURI Admin Dashboard</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for a sleek look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563; /* Gray-600 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280; /* Gray-500 */
      }
      ::-webkit-scrollbar-track {
        background: #1f2937; /* Gray-800 */
      }

      /* Ensure main content takes up remaining vertical space */
      .main-container {
        min-height: calc(
          100vh - 72px
        ); /* 72px is roughly the height of the header */
      }

      /* Transition for layout changes */
      .sidebar-transition {
        transition: all 0.3s ease-in-out;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 font-sans">
    <!-- Header / Navbar -->
    <header
      id="header"
      class="sticky top-0 z-20 flex items-center justify-between p-4 bg-gray-900/90 backdrop-blur-sm shadow-xl border-b border-gray-700/50 h-18"
    >
      <div class="flex items-center">
        <button
          id="sidebar-toggle-mobile"
          class="text-gray-400 hover:text-cyan-400 mr-4 transition lg:hidden"

          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="w-6 h-6"
          >
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-3xl font-extrabold text-cyan-400 tracking-wider">
          LUXURI<span class="text-gray-100 font-light">Admin</span>
        </h1>
      </div>

      <div class="flex items-center space-x-4">
        <!-- Language Selector -->
        <div class="relative">
          <select
            class="appearance-none bg-gray-800 text-gray-200 py-2 px-3 rounded-lg border border-gray-700 hover:border-cyan-500 transition cursor-pointer text-sm"

            <option>EN</option>
            <option>FR</option>
            <option>DE</option>
          </select>
          <div
            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400"
          >
            <svg
              class="w-4 h-4"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >

                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </div>
        </div>

        <!-- Profile/Logout -->
        <div
          class="flex items-center space-x-3 p-1 rounded-full bg-gray-800 pr-3 border border-gray-700 hover:border-cyan-500 transition cursor-pointer group"
        >
          <img
            class="w-10 h-10 rounded-full object-cover border-2 border-gray-600 group-hover:border-cyan-400 transition"
            src="https://placehold.co/40x40/1f2937/a1a1aa?text=A"
            alt="Admin Avatar"
            onerror="this.onerror=null; this.src='https://placehold.co/40x40/1f2937/a1a1aa?text=A';"
          />
          <span class="hidden sm:inline text-sm font-medium text-gray-100">
            SuperAdmin
          </span>
          <button
            class="text-red-400 hover:text-red-300 p-2 rounded-full transition"
            title="Logout"
            onclick="console.log('Logout clicked')"

              xmlns="http://www.w3.org/2000/svg"

              fill="none"
              stroke="currentColor"
              stroke-width="2"

      </div>
    </header>

      // --- Global State ---
      let activeMenu = "dashboard";

      // --- Utility Functions ---

      /** Generates an SVG icon element. */

        const menuClass = isActive
          ? "bg-cyan-700/50 text-cyan-400 font-semibold shadow-inner shadow-cyan-500/20"
          : "text-gray-400 hover:bg-gray-700 hover:text-gray-100";

        return `
                <div

                    data-route="${item.route}"
                    onclick="setRoute('${item.route}')"
                    title="${item.name}"

                    <span class="ml-3 whitespace-nowrap overflow-hidden sidebar-text transition-all duration-300">

                      item.name
                    }</span>

            `;

      // --- Sidebar Logic ---

      /** Toggles the sidebar visibility (for mobile/tablet). */
      const toggleSidebar = (force) => {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebar-overlay");
        const mainContent = document.getElementById("main-content");

        const isOpen =
          typeof force === "boolean"
            ? force
            : sidebar.classList.contains("translate-x-0") &&
              window.innerWidth < 1024;

        if (isOpen) {
          // Open: Show on mobile, expand on desktop
          sidebar.classList.remove("w-0", "-translate-x-full", "lg:w-20");
          sidebar.classList.add("w-64", "translate-x-0", "lg:w-20");
          overlay.classList.remove("hidden");
        } else {
          // Close: Hide on mobile, collapse on desktop
          sidebar.classList.add("w-0", "-translate-x-full", "lg:w-20");
          sidebar.classList.remove("w-64", "translate-x-0");
          overlay.classList.add("hidden");
        }

        // Adjust main content margin based on desktop state
        if (window.innerWidth >= 1024) {
          if (isOpen) {
            mainContent.classList.remove("lg:ml-20");
          } else {
            mainContent.classList.add("lg:ml-20");
          }
        } else {
          mainContent.classList.remove("lg:ml-20");
        }

        // Toggle sidebar text visibility
        const sidebarTextElements = document.querySelectorAll(".sidebar-text");
        sidebarTextElements.forEach((el) => {
          if (window.innerWidth < 1024 && !isOpen) {
            // Mobile: Hide text when sidebar is closed
            el.classList.add("opacity-0", "max-w-0");
            el.classList.remove("opacity-100", "max-w-full");
          } else if (window.innerWidth < 1024 && isOpen) {
            // Mobile: Show text when sidebar is open
            el.classList.add("opacity-100", "max-w-full");
            el.classList.remove("opacity-0", "max-w-0");
          }
          // Desktop state (handled by Tailwind 'lg:' classes in template)
        });

        // Ensure desktop state is correctly applied on load
        if (window.innerWidth >= 1024) {
          sidebar.classList.remove(
            "w-0",
            "-translate-x-full",
            "w-64",
            "translate-x-0"
          );
          sidebar.classList.add("lg:w-20", "translate-x-0");
          mainContent.classList.remove("ml-0");
          mainContent.classList.add("lg:ml-20");
        }
      };

      /** Sets the active route and renders the corresponding content. */
      const setRoute = (route) => {
        activeMenu = route;
        renderSidebar();
        renderMainContent();
        if (window.innerWidth < 1024) {
          toggleSidebar(false); // Close sidebar after selecting on mobile

      const renderSidebar = () => {
        const nav = document.getElementById("sidebar-nav");

      // --- Component Rendering Functions (HTML strings) ---

                <h3 class="text-lg font-semibold text-gray-100 mb-3 border-b border-gray-700 pb-2">${title}</h3>

            </div>
        `;

      // --- Data Table Logic and Rendering ---

      /** Renders the full DataTable structure. */
      const renderDataTable = (
        id,
        title,
        data,
        columns,
        renderRowContent,
        initialSortKey
      ) => {
        const tableData = {
          data: data,
          columns: columns,
          renderRowContent: renderRowContent,
          sortConfig: { key: initialSortKey, direction: "ascending" },
          searchTerm: "",
          currentPage: 1,
          itemsPerPage: 5,
        };
        window.tableState = window.tableState || {};
        window.tableState[id] = tableData;

        const updateTable = () => {
          const table = window.tableState[id];

          // 1. Sort Data
          let sortedItems = [...table.data];
          if (table.sortConfig.key) {
            sortedItems.sort((a, b) => {
              const valA = a[table.sortConfig.key];
              const valB = b[table.sortConfig.key];
              if (valA < valB)
                return table.sortConfig.direction === "ascending" ? -1 : 1;
              if (valA > valB)
                return table.sortConfig.direction === "ascending" ? 1 : -1;
              return 0;
            });
          }

          // 2. Filter Data
          let filteredData = sortedItems;
          if (table.searchTerm) {
            const lowerCaseSearch = table.searchTerm.toLowerCase();
            filteredData = sortedItems.filter((item) =>
              Object.values(item).some((val) =>
                String(val).toLowerCase().includes(lowerCaseSearch)
              )
            );
          }

          // 3. Paginate Data
          const totalPages = Math.ceil(
            filteredData.length / table.itemsPerPage
          );
          const startIndex = (table.currentPage - 1) * table.itemsPerPage;
          const paginatedData = filteredData.slice(
            startIndex,
            startIndex + table.itemsPerPage
          );

          // Update controls
          const pageInfoEl = document.getElementById(`${id}-page-info`);
          if (pageInfoEl)
            pageInfoEl.textContent = `Page ${table.currentPage} of ${
              totalPages || 1
            }`;

          const prevBtn = document.getElementById(`${id}-prev-btn`);
          if (prevBtn) prevBtn.disabled = table.currentPage === 1;

          const nextBtn = document.getElementById(`${id}-next-btn`);
          if (nextBtn)
            nextBtn.disabled =
              table.currentPage === totalPages || totalPages === 0;

          // Update table body
          const tbody = document.getElementById(`${id}-tbody`);
          let rowsHtml = "";
          if (paginatedData.length > 0) {
            rowsHtml = paginatedData
              .map(
                (item) => `
                        <tr class="bg-gray-800 border-b border-gray-700 hover:bg-gray-700/50 transition duration-150">
                            ${table.renderRowContent(item)}
                        </tr>
                    `
              )
              .join("");
          } else {
            rowsHtml = `
                        <tr>
                            <td colspan="${
                              columns.length + 1
                            }" class="text-center py-4 text-gray-500">
                                No data found.
                            </td>
                        </tr>
                    `;
          }
          if (tbody) tbody.innerHTML = rowsHtml;

          // Update table headers (for sort icons)
          const thead = document.getElementById(`${id}-thead`);
          if (thead) {
            const headerHtml = `
                        <tr>
                            ${columns
                              .map(
                                ({ key, label }) => `
                                <th
                                    scope="col"
                                    class="px-6 py-3 cursor-pointer hover:bg-gray-700 transition"
                                    onclick="sortTable('${id}', '${key}')"
                                >
                                    <div class="flex items-center">
                                        ${label}
                                        <span class="ml-1 text-xs">${getSortIcon(
                                          id,
                                          key
                                        )}</span>
                                    </div>
                                </th>
                            `
                              )
                              .join("")}
                            <th scope="col" class="px-6 py-3">Actions</th>
                        </tr>
                    `;
            thead.innerHTML = headerHtml;
          }
        };

        // Global functions (attached to window) for table interaction
        window.changePage = (tableId, delta) => {
          const table = window.tableState[tableId];
          const totalPages = Math.ceil(table.data.length / table.itemsPerPage);
          const newPage = Math.max(
            1,
            Math.min(totalPages, table.currentPage + delta)
          );
          if (newPage !== table.currentPage) {
            table.currentPage = newPage;
            updateTable();
          }
        };

        window.sortTable = (tableId, key) => {
          const table = window.tableState[tableId];
          let direction = "ascending";
          if (
            table.sortConfig.key === key &&
            table.sortConfig.direction === "ascending"
          ) {
            direction = "descending";
          }
          table.sortConfig = { key, direction };
          table.currentPage = 1; // Reset page on sort
          updateTable();
        };

        window.searchTable = (tableId, value) => {
          const table = window.tableState[tableId];
          table.searchTerm = value;
          table.currentPage = 1; // Reset page on search
          updateTable();
        };

        const getSortIcon = (tableId, key) => {
          const table = window.tableState[tableId];
          if (table.sortConfig.key !== key) return "&#8597;"; // Up/Down Arrow
          return table.sortConfig.direction === "ascending"
            ? "&#9650;"
            : "&#9660;"; // Up/Down Triangle
        };

        // Initial render call (will be executed after the function returns the HTML and DOM is available)
        setTimeout(updateTable, 0);

        // HTML structure
        return `
                <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50">
                    <h3 class="text-xl font-semibold text-gray-100 mb-4 border-b border-gray-700 pb-2">${title}</h3>
                    
                    <!-- Search and Pagination Controls -->
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-4 space-y-3 sm:space-y-0">
                        <input
                            type="text"
                            placeholder="Search..."
                            oninput="searchTable('${id}', this.value)"
                            class="w-full sm:w-64 p-2 bg-gray-700 text-gray-200 border border-gray-600 rounded-lg focus:ring-cyan-500 focus:border-cyan-500 transition"
                        />
                        <div class="flex items-center space-x-2 text-sm text-gray-300">
                            <button
                                id="${id}-prev-btn"
                                onclick="changePage('${id}', -1)"
                                class="px-3 py-1 bg-gray-700 rounded-lg hover:bg-cyan-700 disabled:opacity-50 transition"
                            >
                                Prev
                            </button>
                            <span id="${id}-page-info">Page 1 of 1</span>
                            <button
                                id="${id}-next-btn"
                                onclick="changePage('${id}', 1)"
                                class="px-3 py-1 bg-gray-700 rounded-lg hover:bg-cyan-700 disabled:opacity-50 transition"
                            >
                                Next
                            </button>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto relative rounded-xl border border-gray-700/50">
                        <table class="w-full text-sm text-left text-gray-400">
                            <thead id="${id}-thead" class="text-xs text-gray-200 uppercase bg-gray-700/50">
                                <!-- Headers rendered by JS -->
                            </thead>
                            <tbody id="${id}-tbody">
                                <!-- Rows rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
      };

      const renderCarTable = () => {
        const columns = [
          { key: "name", label: "Name" },
          { key: "model", label: "Model" },
          { key: "year", label: "Year" },
          { key: "price", label: "Price/Day" },
          { key: "availability", label: "Availability" },
        ];

        const renderRowContent = (car) => {
          const availabilityClass =
            car.availability === "Available"
              ? "bg-teal-900/50 text-teal-400"
              : car.availability === "Rented"
              ? "bg-amber-900/50 text-amber-400"
              : "bg-red-900/50 text-red-400";

          return `
                    <td class="px-6 py-4 font-medium text-gray-100 whitespace-nowrap">${car.name}</td>
                    <td class="px-6 py-4">${car.model}</td>
                    <td class="px-6 py-4">${car.year}</td>
                    <td class="px-6 py-4 font-semibold text-cyan-400">$${car.price}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-0.5 text-xs font-medium rounded-full ${availabilityClass}">
                            ${car.availability}
                        </span>
                    </td>
                    <td class="px-6 py-4 flex space-x-2">
                        <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-cyan-400 hover:opacity-80 transition-opacity">View</button>
                        <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-yellow-400 hover:opacity-80 transition-opacity">Edit</button>
                        <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-red-400 hover:opacity-80 transition-opacity">Delete</button>
                    </td>
                `;
        };

        return renderDataTable(
          "cars-table",
          "Fleet Management: Latest Cars",
          carsData,
          columns,
          renderRowContent,
          "id"
        );
      };

      const renderClientTable = () => {
        const columns = [
          { key: "name", label: "Client Name" },
          { key: "email", label: "Email" },
          { key: "phone", label: "Phone" },
          { key: "totalRentals", label: "Total Rentals" },
        ];

        const renderRowContent = (client) => `
                <td class="px-6 py-4 font-medium text-gray-100 whitespace-nowrap">${client.name}</td>
                <td class="px-6 py-4">${client.email}</td>
                <td class="px-6 py-4">${client.phone}</td>
                <td class="px-6 py-4 font-mono text-cyan-400">${client.totalRentals}</td>
                <td class="px-6 py-4 flex space-x-2">
                    <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-cyan-400 hover:opacity-80 transition-opacity">View</button>
                    <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-yellow-400 hover:opacity-80 transition-opacity">Edit</button>
                    <button class="p-1 text-sm rounded-lg text-gray-400 hover:text-red-400 hover:opacity-80 transition-opacity">Delete</button>
                </td>
            `;

        return renderDataTable(
          "clients-table",
          "Client Overview: Recent Signups",
          clientsData,
          columns,
          renderRowContent,
          "id"
        );
      };

      // --- Content Section Templates ---

      const renderDashboardContent = () => `
            <div class="p-4 md:p-8 space-y-8">
                <!-- KPI Cards Section -->
                <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
                    ${kpis.map(renderKPICard).join("")}
                </section>

                <!-- Tables Section -->
                <section class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    ${renderCarTable()}
                    ${renderClientTable()}
                </section>

                <!-- Graphs / Analytics Section -->
                <section>
                    <h2 class="text-2xl font-bold text-gray-100 mb-6 pb-2 border-b border-gray-700">Analytics Overview</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        ${renderChartPlaceholder({
                          title: "Revenue Over Time",
                          type: "Line",
                          color: "text-cyan-400",
                          description: "Monthly or Quarterly Revenue Trends",
                        })}
                        ${renderChartPlaceholder({
                          title: "Cars by Category",
                          type: "Bar",
                          color: "text-yellow-400",
                          description:
                            "Breakdown of fleet by luxury, sport, or SUV class",
                        })}
                        ${renderChartPlaceholder({
                          title: "Rentals by Client Type",
                          type: "Pie",
                          color: "text-rose-400",
                          description:
                            "Distribution between Corporate and Individual Clients",
                        })}
                    </div>
                </section>
            </div>
        `;

      const renderAnalyticsContent = () => `
            <div class="p-4 md:p-8 space-y-8">
                <h2 class="text-3xl font-bold text-gray-100 mb-6">Detailed Analytics</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${renderChartPlaceholder({
                      title: "Rental Duration Scatter Plot",
                      type: "Scatter",
                      color: "text-teal-400",
                      description: "Duration vs. Price Correlation",
                    })}
                    ${renderChartPlaceholder({
                      title: "Fleet Utilization Rate",
                      type: "Area",
                      color: "text-indigo-400",
                      description:
                        "Percentage of fleet rented over the last 12 months",
                    })}
                </div>
            </div>
        `;

      const renderGenericContent = (title) => `
            <h2 class="text-3xl font-bold text-gray-100 p-8">${title} View (WIP)</h2>
        `;

      /** Main function to render the current content based on the active menu. */
      const renderMainContent = () => {
        const mainContentEl = document.getElementById("main-content");
        let contentHtml = "";

        switch (activeMenu) {
          case "cars":
            contentHtml = `<div class="p-4 md:p-8">${renderCarTable()}</div>`;
            break;
          case "clients":
            contentHtml = `<div class="p-4 md:p-8">${renderClientTable()}</div>`;
            break;
          case "analytics":
            contentHtml = renderAnalyticsContent();
            break;
          case "rentals":
            contentHtml = renderGenericContent("Rentals Management");
            break;
          case "settings":
            contentHtml = renderGenericContent("Agency Settings");
            break;
          case "dashboard":
          default:
            contentHtml = renderDashboardContent();
            break;
        }
        mainContentEl.innerHTML = contentHtml;
      };

      // --- Initialization and Event Listeners ---

      const init = () => {
        renderSidebar();
        renderMainContent();

        // Event listeners for sidebar toggling
        document
          .getElementById("sidebar-toggle-mobile")
          .addEventListener("click", () => toggleSidebar(true));
        document
          .getElementById("sidebar-close-mobile")
          .addEventListener("click", () => toggleSidebar(false));

        // Handle initial desktop state and resize
        window.addEventListener("resize", () => {
          if (window.innerWidth >= 1024) {
            toggleSidebar(false); // Collapse on desktop if screen size changes
          }
        });

        // Ensure desktop sidebar state is set correctly on load (collapsed)
        if (window.innerWidth >= 1024) {
          document
            .getElementById("sidebar")
            .classList.remove("w-0", "-translate-x-full");
          document
            .getElementById("sidebar")
            .classList.add("lg:w-20", "translate-x-0");
          document.getElementById("main-content").classList.add("lg:ml-20");
        }
      };

      window.onload = init;
    </script>
  </body>
</html>
