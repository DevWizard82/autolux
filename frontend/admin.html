<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXURI Admin Dashboard</title>
    <script src="./src/js/gatekeeper.js"></script>
    <script
      src="https://cdn.plot.ly/plotly-2.27.0.min.js"
      charset="utf-8"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for a sleek look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563; /* Gray-600 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280; /* Gray-500 */
      }
      ::-webkit-scrollbar-track {
        background: #1f2937; /* Gray-800 */
      }

      /* Ensure main content takes up remaining vertical space */
      .main-container {
        min-height: calc(
          100vh - 72px
        ); /* 72px is roughly the height of the header */
      }

      /* Transition for layout changes */
      .sidebar-transition {
        transition: all 0.3s ease-in-out;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-sans transition-colors duration-300"
  >
    <!-- Header / Navbar -->
    <header
      id="header"
      class="sticky top-0 z-20 flex items-center justify-between p-4 bg-white/90 dark:bg-gray-900/90 backdrop-blur-sm shadow-sm dark:shadow-xl border-b border-gray-200 dark:border-gray-700/50 h-18 transition-colors duration-300"
    >
      <div class="flex items-center">
        <button
          id="sidebar-toggle-mobile"
          class="text-gray-400 hover:text-cyan-400 mr-4 transition lg:hidden"
        >
          <!-- Menu Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="w-6 h-6"
          >
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-3xl font-extrabold text-cyan-400 tracking-wider">
          LUXURI<span class="text-gray-100 font-light">Admin</span>
        </h1>
      </div>

      <div class="flex items-center space-x-4">
        <!-- Profile/Logout -->
        <div
          id="nav-user-info"
          class="flex items-center space-x-3 p-1 rounded-full bg-gray-800 pr-3 border border-gray-700 hover:border-cyan-500 transition cursor-pointer group"
        >
          <div
            id="admin-avatar"
            class="w-10 h-10 rounded-full bg-cyan-600 flex items-center justify-center text-sm font-bold text-white border-2 border-gray-600 group-hover:border-cyan-400 transition"
          ></div>

          <span
            id="admin-name"
            class="hidden sm:inline text-sm font-medium text-gray-100"
          >
          </span>

          <button
            class="text-red-400 hover:text-red-300 p-2 rounded-full transition"
            title="Logout"
            onclick="window.app.logout()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-5 h-5"
            >
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="flex main-container">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="fixed lg:static h-full bg-gray-800/95 lg:bg-gray-800 z-30 sidebar-transition shadow-2xl border-r border-gray-700 w-0 -translate-x-full lg:w-20 lg:translate-x-0"
      >
        <!-- Mobile Close Button (only visible on small screens when open) -->
        <div class="flex items-center justify-between p-4 lg:hidden">
          <div class="text-xl font-bold text-cyan-400">LUXURI</div>
          <button
            id="sidebar-close-mobile"
            class="text-gray-400 hover:text-gray-100"
          >
            <!-- X Icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-6 h-6"
            >
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <!-- Navigation Links -->
        <nav id="sidebar-nav" class="p-4 space-y-2 mt-4">
          <!-- Links will be populated by JS -->
        </nav>
      </div>

      <!-- Overlay for mobile when sidebar is open -->
      <div
        id="sidebar-overlay"
        class="hidden fixed inset-0 bg-black opacity-50 z-20 lg:hidden"
        onclick="toggleSidebar(false)"
      ></div>

      <!-- Main Content Area -->
      <main id="main-content" class="flex-grow sidebar-transition ml-0 lg:ml-0">
        <!-- Content will be injected here -->
      </main>
    </div>

    <script type="module" src="./src/js/admin.js"></script>
  </body>
</html>
