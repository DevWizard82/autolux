<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autolux - Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/css/login.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <form id="register-form" class="login-card">
        <h1 class="brand">AUTOLUX</h1>
        <h2 class="title">Create account</h2>
        <p class="subtitle">Join the luxury experience</p>

        <div class="input-group">
          <input type="text" id="first_name" required />
          <label>First name</label>
        </div>

        <div class="input-group">
          <input type="text" id="last_name" required />
          <label>Last name</label>
        </div>

        <div class="input-group">
          <input type="tel" id="phone" required />
          <label>Phone number</label>
        </div>

        <div class="input-group">
          <input type="text" id="email" required />
          <label>Email</label>
        </div>

        <div class="input-group">
          <input type="password" id="password" required />
          <label>Password</label>
        </div>

        <button type="submit" class="login-btn">Register</button>

        <p class="switch-auth">
          Already have an account ?
          <a href="login.html">Login</a>
        </p>

        <p id="error-msg" class="error-msg"></p>
      </form>
    </div>
    <script type="module">
      const form = document.getElementById("register-form");
      const errorMsg = document.getElementById("error-msg");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payLoad = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          first_name: document.getElementById("first_name").value,
          last_name: document.getElementById("last_name").value,
          phone: document.getElementById("phone").value,
        };

        try {
          console.log({ email, password, first_name, last_name, phone });

          const res = await fetch("http://localhost:3000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payLoad),
          });

          const data = await res.json();

          if (data.success) {
            window.location.href = "login.html";
          } else {
            errorMsg.textContent =
              data.detail || data.error || "Registration failed";
          }
        } catch {
          errorMsg.textContent = "Server Error";
        }
      });
    </script>
  </body>
</html>
